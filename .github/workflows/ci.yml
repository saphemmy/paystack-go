name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.22", "1.23"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Verify gofmt
        run: |
          diff=$(gofmt -s -l .)
          if [ -n "$diff" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$diff"
            exit 1
          fi

      - name: go vet (root module)
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test with race and coverage
        run: go test -race -coverpkg=./... -coverprofile=coverage.out ./tests/... ./internal/...

      - name: Print coverage
        run: go tool cover -func=coverage.out | tail -1

      - name: Test framework adapters
        run: |
          for dir in paystackgin paystackfiber paystackecho; do
            echo "--- $dir"
            (cd "$dir" && go vet ./... && go test -race -cover ./...)
          done

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
          args: --timeout=5m
